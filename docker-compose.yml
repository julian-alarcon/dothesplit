services:
  postgres:
    image: postgres:18.3-alpine3.22
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dts}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-dts}
    volumes:
      # Postgres 18+ expects the mount at /var/lib/postgresql so data goes
      # into a major-version-specific subdir (e.g. /var/lib/postgresql/18/docker).
      # This is what allows future pg_upgrade --link to work in place.
      - dts_pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dts} -d ${POSTGRES_DB:-dts}"]
      interval: 5s
      timeout: 3s
      retries: 10
    # Caps initdb needs: chown the data dir, set IDs. Everything else dropped.
    cap_drop: [ALL]
    cap_add: [CHOWN, DAC_OVERRIDE, FOWNER, SETUID, SETGID]
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    pids_limit: 200
    # ports: ["127.0.0.1:5432:5432"]  # uncomment for local debugging only

  migrate:
    image: migrate/migrate:v4.19.1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./api/migrations:/migrations:ro
    environment:
      DATABASE_URL: ${DATABASE_URL}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - 'exec migrate -path /migrations -database "$$DATABASE_URL" up'
    restart: "no"
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=8m

  api:
    build:
      context: ./api
      args:
        BUILD_COMMIT: ${BUILD_COMMIT:-dev}
        BUILD_VERSION: ${BUILD_VERSION:-dev}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL}
      API_HTTP_ADDR: ":8080"
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      SESSION_COOKIE_DOMAIN: ${SESSION_COOKIE_DOMAIN:-}
      EMAIL_ENC_KEY: ${EMAIL_ENC_KEY:?EMAIL_ENC_KEY must be set in .env}
      EMAIL_HMAC_KEY: ${EMAIL_HMAC_KEY:?EMAIL_HMAC_KEY must be set in .env}
      PASSWORD_PEPPER: ${PASSWORD_PEPPER:?PASSWORD_PEPPER must be set in .env}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - /api
        - --healthcheck
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m

  worker:
    build:
      context: ./api
      args:
        BUILD_COMMIT: ${BUILD_COMMIT:-dev}
        BUILD_VERSION: ${BUILD_VERSION:-dev}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    entrypoint: ["/worker"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      EMAIL_ENC_KEY: ${EMAIL_ENC_KEY:?EMAIL_ENC_KEY must be set in .env}
      EMAIL_HMAC_KEY: ${EMAIL_HMAC_KEY:?EMAIL_HMAC_KEY must be set in .env}
      PASSWORD_PEPPER: ${PASSWORD_PEPPER:?PASSWORD_PEPPER must be set in .env}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    restart: unless-stopped
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        # Baked into the image so the footer can show which revision is live.
        # `make up` populates both from the working tree (git short SHA + web/package.json version).
        BUILD_COMMIT: ${BUILD_COMMIT:-dev}
        BUILD_VERSION: ${BUILD_VERSION:-dev}
    depends_on:
      - api
    environment:
      API_BASE_URL_INTERNAL: http://api:8080
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:8080}
      HOST: "0.0.0.0"
      PORT: "3000"
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    healthcheck:
      # Node 24 ships fetch globally; the image has no curl/wget.
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m

volumes:
  dts_pg_data:
