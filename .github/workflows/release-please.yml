name: release
run-name: release · ${{ github.event.head_commit.message || github.ref_name }}

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: release / please
    runs-on: ubuntu-24.04
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          # Use a fine-grained PAT so release-tag pushes trigger downstream
          # workflows (publish, compliance). The default GITHUB_TOKEN
          # deliberately suppresses workflow runs from events it caused,
          # which would otherwise leave each release without published
          # images or SBOMs.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
