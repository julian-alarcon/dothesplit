openapi: 3.0.3
info:
  title: DoTheSplit API
  version: 0.2.0
  description: |
    Split expenses among group members.


    Expense-sharing API for the DoTheSplit app.

    Conventions:
      * All money values are integer cents (no floats).
      * All IDs are UUIDs.
      * Authentication is an opaque session cookie (`dts_session` on plain HTTP,
        `__Host-dts_session` on HTTPS) set by `/v1/auth/login`.
      * The session cookie is `SameSite=Lax`; write endpoints rely on that for CSRF.
      * Request bodies reject unknown fields (`additionalProperties: false`).
      * Times are RFC 3339 UTC.

    Versioning:
      * Business endpoints live under `/v1`. Breaking changes → `/v2`.
      * `/healthz` and `/readyz` are infrastructure endpoints and are NOT versioned.
  contact:
    name: DoTheSplit
    url: https://github.com/julian-alarcon/dothesplit
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

externalDocs:
  description: Product scope and architecture
  url: https://github.com/julian-alarcon/dothesplit/blob/main/BLUEPRINT.md

servers:
  - url: http://localhost:8080
    description: Local dev (Docker Compose)

tags:
  - name: auth
    description: Registration, login, logout, current-user lookup.
  - name: groups
    description: Groups and membership. The creator is auto-added; any member can add others.
  - name: expenses
    description: Expenses with arbitrary split modes (equal, exact, percent, shares). Soft-deleted. Edits tracked in `expense_revisions`.
  - name: categories
    description: Seeded expense categories (emoji + slug). Read-only in v1.
  - name: balances
    description: Computed net balances and simplified pairwise debts. Never stored.
  - name: settlements
    description: "`X paid Y` records that offset balances."
  - name: recurring
    description: Templates materialized into real expenses by the background worker.
  - name: activity
    description: Merged, paginated feed of expenses and settlements for a group, newest first.
  - name: health
    description: Liveness and readiness probes (unversioned).
  - name: admin
    description: Instance-wide administration. Requires role=admin; destructive verbs require a step-up password in the request body.
  - name: setup
    description: First-run install ceremony. Active only while no admin exists.

security:
  - cookieAuth: []

paths:
  /healthz:
    get:
      summary: Liveness
      operationId: healthz
      security: []
      tags: [health]
      responses:
        "200":
          description: OK

  /readyz:
    get:
      summary: Readiness (pings DB)
      operationId: readyz
      security: []
      tags: [health]
      responses:
        "200":
          description: OK
        "503": { $ref: "#/components/responses/ServiceUnavailable" }

  /v1/setup/status:
    get:
      summary: Returns whether first-run setup has been completed.
      operationId: getSetupStatus
      tags: [setup]
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SetupStatus" }

  /v1/setup/admin:
    post:
      summary: Complete first-run setup by creating the admin account.
      description: |
        Validates the setup token (logged to API stdout on every boot while
        the install ceremony is pending) and creates the very first user
        with role=admin. Idempotent: subsequent calls after success return
        410 Gone regardless of token.
      operationId: completeSetup
      tags: [setup]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetupCompleteRequest" }
      responses:
        "201":
          description: Admin created; session cookie set.
          headers:
            Set-Cookie:
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401":
          description: Invalid setup token.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409": { $ref: "#/components/responses/Conflict" }
        "410":
          description: Setup already completed; the install ceremony is closed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  /v1/auth/register:
    post:
      summary: Register a new user
      description: |
        When SMTP is configured the new account starts unverified: the response
        body's `verification_required` is `true`, no session cookie is set, and
        a 6-digit verification code is emailed to the address. The user must
        POST it to `/v1/auth/verify` before they can log in. When SMTP is not
        configured the account is auto-verified immediately and the response
        sets a session cookie just like login.
      operationId: register
      security: []
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterRequest" }
      responses:
        "201":
          description: Created. Session cookie is set only when `verification_required` is false.
          headers:
            Set-Cookie:
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RegisterResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/SetupRequired" }
        "409": { $ref: "#/components/responses/Conflict" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  /v1/auth/verify:
    post:
      summary: Verify a pending registration with the 6-digit code
      operationId: verifyEmail
      security: []
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VerifyEmailRequest" }
      responses:
        "200":
          description: Verified; session cookie set.
          headers:
            Set-Cookie:
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "410":
          description: Verification code expired or already used.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  /v1/auth/verify/resend:
    post:
      summary: Resend the registration verification code
      description: |
        Always returns 204 regardless of whether the email matches a pending
        registration, to avoid account enumeration. Rate-limited per IP.
      operationId: resendVerification
      security: []
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ResendVerificationRequest" }
      responses:
        "204":
          description: Accepted. A new code may have been sent.
        "400": { $ref: "#/components/responses/BadRequest" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  /v1/auth/password-reset/request:
    post:
      summary: Begin a password reset (sends a 6-digit code by email)
      description: |
        Always responds 204 to avoid account enumeration: the same response
        shape is returned whether the email is registered or not. When the
        email matches an active user a code is enqueued; otherwise nothing
        happens. Rate-limited per IP.
      operationId: requestPasswordReset
      security: []
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PasswordResetRequest" }
      responses:
        "204":
          description: Accepted. A code may have been emailed.
        "400": { $ref: "#/components/responses/BadRequest" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  /v1/auth/password-reset/confirm:
    post:
      summary: Complete a password reset using the 6-digit code
      operationId: confirmPasswordReset
      security: []
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PasswordResetConfirm" }
      responses:
        "200":
          description: Password rotated; session cookie set.
          headers:
            Set-Cookie:
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "410":
          description: Verification code expired or already used.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  /v1/auth/login:
    post:
      summary: Log in
      operationId: login
      security: []
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: Logged in; session cookie set
          headers:
            Set-Cookie:
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Account exists but the email address has not been verified yet.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  /v1/auth/logout:
    post:
      summary: Log out (clears session)
      operationId: logout
      tags: [auth]
      responses:
        "204":
          description: Logged out

  /v1/me:
    get:
      summary: Get the current user
      operationId: me
      tags: [auth]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    patch:
      summary: Rename the current user
      operationId: updateMe
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateMeRequest" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    delete:
      summary: Soft-delete the current user (tombstones display_name, scrubs email, clears all sessions)
      operationId: deleteMe
      tags: [auth]
      responses:
        "204":
          description: Account deleted; session cleared
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/me/password:
    post:
      summary: Change the current user's password (requires old password)
      operationId: changePassword
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChangePasswordRequest" }
      responses:
        "204":
          description: Password changed
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/me/email/change-request:
    post:
      summary: Begin a change-email flow (sends a code to the new address)
      description: |
        Step-up: the caller's current password must be supplied. The new email
        is held in a verification token and only persisted to `users.email`
        when the user POSTs the matching 6-digit code to
        `/v1/me/email/change-confirm`. The current address keeps working until
        confirm succeeds.
      operationId: changeEmailRequest
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChangeEmailRequest" }
      responses:
        "202":
          description: Code sent (if SMTP is configured); awaiting confirmation.
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409": { $ref: "#/components/responses/Conflict" }
        "423":
          description: Step-up rate-limited.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /v1/me/email/change-confirm:
    post:
      summary: Confirm a pending email change with the 6-digit code
      description: |
        On success the user's email is updated, all sessions for the user are
        revoked, and a fresh session cookie is issued so the current browser
        stays logged in.
      operationId: changeEmailConfirm
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ConfirmEmailChangeRequest" }
      responses:
        "200":
          description: Email updated; new session cookie set.
          headers:
            Set-Cookie:
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409": { $ref: "#/components/responses/Conflict" }
        "410":
          description: Verification code expired or already used.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  /v1/me/notifications:
    get:
      summary: Get the current user's notification preferences
      operationId: getMyNotifications
      tags: [auth]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NotificationPrefs" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    patch:
      summary: Update the current user's notification preferences
      operationId: updateMyNotifications
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NotificationPrefs" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NotificationPrefs" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/me/avatar:
    put:
      summary: Upload an 8x8 avatar PNG (base64-encoded, <= 1024 bytes)
      operationId: setAvatar
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetAvatarRequest" }
      responses:
        "204":
          description: Avatar saved
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    delete:
      summary: Remove the current user's avatar (falls back to initials on display)
      operationId: deleteAvatar
      tags: [auth]
      responses:
        "204":
          description: Avatar cleared
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/users/{id}/avatar:
    get:
      summary: Serve a user's pixelated avatar PNG (group-member access)
      description: |
        Returns the stored avatar PNG for the user. The source is an 8x8 bitmap
        uploaded by the client; the server upscales it with nearest-neighbour
        sampling before storage so it renders crisp at any CSS size. Callers
        must share at least one group with the target user. Browsers should
        cache on `?v={avatar_updated_at}` to avoid stale renders when the owner
        updates.
      operationId: getUserAvatar
      tags: [auth]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: PNG bytes
          content:
            image/png:
              schema: { type: string, format: binary }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/groups:
    get:
      summary: List groups the current user belongs to
      operationId: listGroups
      tags: [groups]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Group" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      summary: Create a group
      operationId: createGroup
      tags: [groups]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateGroupRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Group" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/groups/{id}:
    patch:
      summary: Update a group (rename or change default currency)
      operationId: updateGroup
      tags: [groups]
      parameters:
        - $ref: "#/components/parameters/GroupId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateGroupRequest" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Group" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
    delete:
      summary: Delete a group (creator only; cascades)
      operationId: deleteGroup
      tags: [groups]
      parameters:
        - $ref: "#/components/parameters/GroupId"
      responses:
        "204":
          description: Deleted
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/groups/{id}/members:
    post:
      summary: Add a member to a group (invitee must be registered)
      operationId: addGroupMember
      tags: [groups]
      parameters:
        - $ref: "#/components/parameters/GroupId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddMemberRequest" }
      responses:
        "201":
          description: Added
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GroupMember" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/groups/{id}/members/{userId}:
    delete:
      summary: Remove a member (creator removes anyone; members may leave themselves)
      description: |
        The group creator can remove any non-creator member. Any member may
        remove themselves (leave). The creator cannot leave or be removed -
        ownership transfer or full group deletion is required first.
        The target's net balance for the group must be exactly zero (settle up
        first), so removing them never silently writes off debt. If the group
        ends up with fewer than 2 members, any pinned `default_split` is
        cleared automatically.
      operationId: removeGroupMember
      tags: [groups]
      parameters:
        - $ref: "#/components/parameters/GroupId"
        - name: userId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Member removed
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/groups/{id}/expenses:
    get:
      summary: List group expenses (newest first)
      operationId: listExpenses
      tags: [expenses]
      parameters:
        - $ref: "#/components/parameters/GroupId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Expense" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      summary: Create an expense
      operationId: createExpense
      tags: [expenses]
      parameters:
        - $ref: "#/components/parameters/GroupId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateExpenseRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Expense" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /v1/expenses/{id}:
    get:
      summary: Fetch a single expense (members only)
      operationId: getExpense
      tags: [expenses]
      parameters:
        - $ref: "#/components/parameters/ExpenseId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Expense" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      summary: Update description, amount, category, or payer (payer or group creator only)
      description: |
        Editable fields: `description`, `amount_cents`, `category_id`, `payer_id`.
        Splits are rescaled proportionally when `amount_cents` changes, preserving
        each member's relative share. A row is appended to `expense_revisions`
        for every change.
      operationId: updateExpense
      tags: [expenses]
      parameters:
        - $ref: "#/components/parameters/ExpenseId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateExpenseRequest" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Expense" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      summary: Soft-delete an expense (any group member)
      operationId: deleteExpense
      tags: [expenses]
      parameters:
        - $ref: "#/components/parameters/ExpenseId"
      responses:
        "204":
          description: Deleted
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/expenses/{id}/revisions:
    get:
      summary: Full edit history of an expense (oldest first)
      operationId: listExpenseRevisions
      tags: [expenses]
      parameters:
        - $ref: "#/components/parameters/ExpenseId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ExpenseRevision" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/categories:
    get:
      summary: List available expense categories (seeded)
      operationId: listCategories
      tags: [categories]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Category" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/groups/{id}/balances:
    get:
      summary: Get net balances + simplified pairwise debts for a group
      operationId: getBalances
      tags: [balances]
      parameters:
        - $ref: "#/components/parameters/GroupId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BalancesResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /v1/groups/{id}/settlements:
    get:
      summary: List settlements in a group
      operationId: listSettlements
      tags: [settlements]
      parameters:
        - $ref: "#/components/parameters/GroupId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Settlement" }
    post:
      summary: Record a settlement (one member pays another)
      operationId: createSettlement
      tags: [settlements]
      parameters:
        - $ref: "#/components/parameters/GroupId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateSettlementRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Settlement" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /v1/settlements/{id}:
    get:
      summary: Get a single settlement by id (member-only)
      operationId: getSettlement
      tags: [settlements]
      parameters:
        - $ref: "#/components/parameters/SettlementId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Settlement" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      summary: Soft-delete a settlement (any group member)
      operationId: deleteSettlement
      tags: [settlements]
      parameters:
        - $ref: "#/components/parameters/SettlementId"
      responses:
        "204":
          description: Deleted
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/groups/{id}/activity:
    get:
      summary: List the merged activity feed for a group (newest first, paginated)
      operationId: listActivity
      tags: [activity]
      parameters:
        - $ref: "#/components/parameters/GroupId"
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
          description: Max items to return. Defaults to 50.
        - in: query
          name: cursor
          required: false
          schema: { type: string }
          description: Opaque cursor returned by a previous response; omit for the first page.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ActivityPage" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /v1/groups/{id}/recurring-expenses:
    get:
      summary: List recurring expense templates for a group
      operationId: listRecurringExpenses
      tags: [recurring]
      parameters:
        - $ref: "#/components/parameters/GroupId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RecurringExpense" }
    post:
      summary: Create a recurring expense template
      operationId: createRecurringExpense
      tags: [recurring]
      parameters:
        - $ref: "#/components/parameters/GroupId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateRecurringExpenseRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RecurringExpense" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /v1/recurring-expenses/{id}:
    delete:
      summary: Delete a recurring template
      operationId: deleteRecurringExpense
      tags: [recurring]
      parameters:
        - $ref: "#/components/parameters/RecurringId"
      responses:
        "204":
          description: Deleted
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/admin/users:
    get:
      summary: List all users (admin)
      operationId: adminListUsers
      tags: [admin]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0, default: 0 }
        - name: include_deleted
          in: query
          schema: { type: boolean, default: false }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminUserListResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      summary: Create a user on behalf (admin)
      operationId: adminCreateUser
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdminUserCreateRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminUser" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }

  /v1/admin/users/{id}:
    get:
      summary: Get a single user (admin)
      operationId: adminGetUser
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminUser" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      summary: Soft-delete a user (admin, step-up)
      operationId: adminDeleteUser
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StepUpRequest" }
      responses:
        "204":
          description: Deleted
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "423":
          description: Step-up rate-limited; retry after the cooldown.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /v1/admin/users/{id}/password:
    post:
      summary: Send the user a password-reset email (admin, step-up)
      description: |
        Scrambles the target user's password hash, revokes every active
        session for them, and emails them a 6-digit code so they can set a
        new password through the standard /reset flow. The admin never types
        a temporary password.
      operationId: adminResetUserPassword
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StepUpRequest" }
      responses:
        "204":
          description: Password reset email queued; target's sessions revoked.
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "423":
          description: Step-up rate-limited.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /v1/admin/users/{id}/role:
    patch:
      summary: Promote or demote a user (admin, step-up)
      operationId: adminSetUserRole
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdminSetUserRoleRequest" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminUser" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "423":
          description: Step-up rate-limited.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /v1/admin/groups:
    get:
      summary: List all groups across the instance (admin)
      operationId: adminListGroups
      tags: [admin]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminGroupListResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /v1/admin/groups/{id}:
    delete:
      summary: Soft-delete any group (admin, step-up)
      operationId: adminDeleteGroup
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StepUpRequest" }
      responses:
        "204":
          description: Deleted
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "423":
          description: Step-up rate-limited.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /v1/admin/smtp:
    get:
      summary: Get SMTP configuration (admin)
      operationId: adminGetSmtpConfig
      tags: [admin]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SmtpConfig" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      summary: Update SMTP configuration (admin)
      operationId: adminUpdateSmtpConfig
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SmtpConfigUpdateRequest" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SmtpConfig" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /v1/admin/smtp/password:
    get:
      summary: Reveal the stored SMTP password (admin)
      description: |
        Decrypts and returns the SMTP password as cleartext. Admin-only and
        audit-logged as `admin_view_smtp_password`. The cleartext is never
        returned by `GET /v1/admin/smtp` - admins must use this dedicated
        endpoint, which makes the action explicit and reviewable.
      operationId: adminRevealSmtpPassword
      tags: [admin]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SmtpPasswordResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: SMTP is not configured, or no password is stored.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /v1/admin/smtp/test:
    post:
      summary: Test the current SMTP configuration (admin)
      operationId: adminTestSmtpConfig
      tags: [admin]
      responses:
        "200":
          description: Result of the connection test.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SmtpTestResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/admin/smtp/send-test:
    post:
      summary: Send a real test email to the admin's own address (admin)
      description: |
        Sends a plain-text test email through the configured SMTP server to
        the calling admin's verified email address. Synchronous: the SMTP
        result is reflected directly in the response (no outbox round-trip),
        so failures surface immediately in the admin UI.
      operationId: adminSendSmtpTestEmail
      tags: [admin]
      responses:
        "200":
          description: Result of the send attempt.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SmtpTestResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/admin/audit:
    get:
      summary: List admin audit entries (admin)
      operationId: adminListAuditLog
      tags: [admin]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0, default: 0 }
        - name: action
          in: query
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminAuditListResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: dts_session
      description: |
        Session cookie. Name is `dts_session` on plain HTTP deployments and
        `__Host-dts_session` when `COOKIE_SECURE=true`.

  parameters:
    GroupId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    ExpenseId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    RecurringId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    SettlementId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }

  responses:
    BadRequest:
      description: Invalid input (malformed JSON, failed validation, or unknown field).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unauthorized:
      description: Missing or invalid session cookie.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: Authenticated but not permitted for this resource.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Resource does not exist (or is hidden by soft-delete).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Conflict:
      description: Request conflicts with existing state (e.g. duplicate email).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    TooManyRequests:
      description: Rate limited. Retry after the `Retry-After` header.
      headers:
        Retry-After:
          description: Seconds until the client may retry.
          schema: { type: integer, minimum: 1 }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    ServiceUnavailable:
      description: Server is not ready (e.g. DB unreachable).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    SetupRequired:
      description: Instance is in first-run setup mode; visit /setup.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }

    User:
      type: object
      required: [id, email, display_name, created_at, has_avatar, week_start]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        display_name: { type: string }
        created_at: { type: string, format: date-time }
        has_avatar:
          type: boolean
          description: True when the user has uploaded a pixel avatar. Fetch it at `/v1/users/{id}/avatar`.
        avatar_updated_at:
          type: string
          format: date-time
          description: Cache-buster for the avatar URL. Changes on every upload/delete.
        deleted_at:
          type: string
          format: date-time
          description: Set when the account has been soft-deleted; `display_name` is then a tombstone.
        week_start:
          type: integer
          enum: [0, 1]
          description: First day of the week in calendar UIs. 0 = Sunday, 1 = Monday.
        timezone:
          type: string
          nullable: true
          description: IANA timezone (e.g. "Europe/Madrid"). Null means the client should use the device-detected zone.
        is_admin:
          type: boolean
          readOnly: true
          description: True when the user has the admin role. Read-only; promotion only happens via the bootstrap path or an admin endpoint.
        email_verified_at:
          type: string
          format: date-time
          nullable: true
          description: When the email address was confirmed. Null until the user verifies, or set automatically at registration when SMTP is unconfigured.

    UpdateMeRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        display_name: { type: string, minLength: 1, maxLength: 80 }
        week_start:
          type: integer
          enum: [0, 1]
          description: First day of the week. 0 = Sunday, 1 = Monday.
        timezone:
          type: string
          maxLength: 64
          description: IANA timezone (e.g. "Europe/Madrid"). Send an empty string to revert to device detection.

    ChangePasswordRequest:
      type: object
      additionalProperties: false
      required: [old_password, new_password]
      properties:
        old_password: { type: string, minLength: 1, maxLength: 256 }
        new_password: { type: string, minLength: 10, maxLength: 256 }

    SetAvatarRequest:
      type: object
      additionalProperties: false
      required: [png_base64]
      properties:
        png_base64:
          type: string
          minLength: 1
          maxLength: 1500
          description: Base64-encoded PNG. Decoded size must be <= 1024 bytes and the image exactly 8x8 pixels.

    RegisterRequest:
      type: object
      additionalProperties: false
      required: [email, password, display_name]
      properties:
        email: { type: string, format: email, maxLength: 254 }
        password: { type: string, minLength: 10, maxLength: 256 }
        display_name: { type: string, minLength: 1, maxLength: 80 }
      example:
        email: alice@example.com
        password: correct-horse-battery-staple
        display_name: Alice

    RegisterResponse:
      type: object
      required: [user, verification_required]
      properties:
        user: { $ref: "#/components/schemas/User" }
        verification_required:
          type: boolean
          description: True when the user must POST a 6-digit code to `/v1/auth/verify` before logging in. False when SMTP is unconfigured and the account was auto-verified.

    VerifyEmailRequest:
      type: object
      additionalProperties: false
      required: [email, code]
      properties:
        email: { type: string, format: email, maxLength: 254 }
        code:
          type: string
          minLength: 6
          maxLength: 6
          pattern: "^[0-9]{6}$"
          description: 6-digit numeric code received by email.
      example:
        email: alice@example.com
        code: "482193"

    PasswordResetRequest:
      type: object
      additionalProperties: false
      required: [email]
      properties:
        email: { type: string, format: email, maxLength: 254 }
      example:
        email: alice@example.com

    PasswordResetConfirm:
      type: object
      additionalProperties: false
      required: [email, code, new_password]
      properties:
        email: { type: string, format: email, maxLength: 254 }
        code:
          type: string
          minLength: 6
          maxLength: 6
          pattern: "^[0-9]{6}$"
          description: 6-digit numeric code received by email.
        new_password: { type: string, minLength: 10, maxLength: 256 }
      example:
        email: alice@example.com
        code: "482193"
        new_password: correct-horse-battery-staple

    ResendVerificationRequest:
      type: object
      additionalProperties: false
      required: [email]
      properties:
        email: { type: string, format: email, maxLength: 254 }
      example:
        email: alice@example.com

    ChangeEmailRequest:
      type: object
      additionalProperties: false
      required: [new_email, password]
      properties:
        new_email: { type: string, format: email, maxLength: 254 }
        password:
          type: string
          minLength: 1
          description: The caller's current password (step-up).
      example:
        new_email: alice.new@example.com
        password: correct-horse-battery-staple

    ConfirmEmailChangeRequest:
      type: object
      additionalProperties: false
      required: [code]
      properties:
        code:
          type: string
          minLength: 6
          maxLength: 6
          pattern: "^[0-9]{6}$"
          description: 6-digit code received at the new address.
      example:
        code: "917544"

    NotificationPrefs:
      type: object
      additionalProperties: false
      description: |
        Per-user, per-event email opt-in flags. All default to false (off).
        The server only emails when the corresponding flag is true AND SMTP is
        configured.
      properties:
        notify_recurring_run:
          type: boolean
          description: Email me when a recurring expense is materialized in one of my groups.
        notify_settlement:
          type: boolean
          description: Email me when a settlement is recorded in one of my groups.
        notify_group_added:
          type: boolean
          description: Email me when I am added to a new group.

    SetupStatus:
      type: object
      additionalProperties: false
      required: [locked]
      properties:
        locked:
          type: boolean
          description: True after the install ceremony has been completed; false while it is still pending.

    SetupCompleteRequest:
      type: object
      additionalProperties: false
      required: [token, email, password, display_name]
      properties:
        token: { type: string, minLength: 1, maxLength: 256 }
        email: { type: string, format: email, maxLength: 254 }
        password: { type: string, minLength: 10, maxLength: 256 }
        display_name: { type: string, minLength: 1, maxLength: 80 }

    LoginRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    Group:
      type: object
      required: [id, name, default_currency, created_by, created_at, members]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        default_currency:
          type: string
          minLength: 3
          maxLength: 3
          description: ISO-4217 code used when expenses omit currency
        created_by: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
        members:
          type: array
          items: { $ref: "#/components/schemas/GroupMember" }
        default_split:
          type: array
          minItems: 2
          maxItems: 2
          description: |
            Optional 2-member percentage split that prefills the create-expense form.
            Automatically cleared by the server when the group grows past 2 members.
          items: { $ref: "#/components/schemas/DefaultSplitEntry" }

    DefaultSplitEntry:
      type: object
      required: [user_id, basis_points]
      additionalProperties: false
      properties:
        user_id: { type: string, format: uuid }
        basis_points:
          type: integer
          minimum: 0
          maximum: 10000
          description: 0..10000; the two entries must sum to exactly 10000.

    GroupMember:
      type: object
      required: [user_id, display_name, joined_at, has_avatar]
      properties:
        user_id: { type: string, format: uuid }
        display_name: { type: string }
        joined_at: { type: string, format: date-time }
        has_avatar: { type: boolean }
        avatar_updated_at: { type: string, format: date-time }
        deleted_at:
          type: string
          format: date-time
          description: Set when the user has soft-deleted their account; `display_name` is a tombstone.

    CreateGroupRequest:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 80 }
        default_currency:
          type: string
          minLength: 3
          maxLength: 3
          default: "EUR"
      example:
        name: Trip to Lisbon
        default_currency: EUR

    UpdateGroupRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name: { type: string, minLength: 1, maxLength: 80 }
        default_currency:
          type: string
          minLength: 3
          maxLength: 3
        default_split:
          type: array
          maxItems: 2
          nullable: true
          description: |
            Set the default 2-member split. Pass an empty array (or null) to clear it.
            Only valid when the group has exactly 2 members.
          items: { $ref: "#/components/schemas/DefaultSplitEntry" }
        created_by:
          type: string
          format: uuid
          description: |
            Transfer group ownership to another member. Only the current owner
            may set this; the target must already be a member of the group.

    AddMemberRequest:
      type: object
      additionalProperties: false
      required: [email]
      properties:
        email: { type: string, format: email }

    SplitMode:
      type: string
      enum: [equal, exact, percent, shares]

    SplitInput:
      type: object
      additionalProperties: false
      required: [user_id]
      properties:
        user_id: { type: string, format: uuid }
        # For mode=exact: value is the absolute amount in cents.
        # For mode=percent: value is 0..10000 (basis points, 10000 = 100%).
        # For mode=shares: value is an integer share weight.
        # For mode=equal: value is ignored (server splits evenly).
        value: { type: integer, format: int64, minimum: 0 }

    Split:
      type: object
      required: [user_id, share_cents]
      properties:
        user_id: { type: string, format: uuid }
        share_cents: { type: integer, format: int64, minimum: 0 }

    CreateExpenseRequest:
      type: object
      additionalProperties: false
      required: [description, amount_cents, payer_id, mode, splits]
      properties:
        description: { type: string, minLength: 1, maxLength: 200 }
        amount_cents: { type: integer, format: int64, minimum: 1 }
        currency: { type: string, minLength: 3, maxLength: 3, description: "Defaults to group.default_currency if omitted" }
        payer_id: { type: string, format: uuid }
        incurred_at: { type: string, format: date-time }
        category_id:
          type: string
          format: uuid
          description: "Defaults to the `other` category when omitted."
        mode: { $ref: "#/components/schemas/SplitMode" }
        splits:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/SplitInput" }
      example:
        description: Hotel
        amount_cents: 20000
        payer_id: 7a1d5b9e-0c0a-4a12-9a55-0c55cf2b6fb1
        mode: equal
        splits:
          - user_id: 7a1d5b9e-0c0a-4a12-9a55-0c55cf2b6fb1
          - user_id: 9c0e3a31-6b2f-41d7-bf80-7a3f1b6d3d24

    UpdateExpenseRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        description: { type: string, minLength: 1, maxLength: 200 }
        amount_cents: { type: integer, format: int64, minimum: 1 }
        category_id: { type: string, format: uuid }
        payer_id:
          type: string
          format: uuid
          description: New payer; must be a current group member.
        mode:
          allOf:
            - $ref: "#/components/schemas/SplitMode"
          description: |
            Must be supplied together with `splits`. When both are present, the server
            re-resolves per-user shares. When neither is present, existing splits are
            rescaled proportionally if `amount_cents` changes.
        splits:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/SplitInput" }
          description: Must be supplied together with `mode`.
        incurred_at:
          type: string
          format: date-time
          description: |
            When the expense was incurred (independent of when it was recorded).
            Defaults to the creation time if omitted on create, then immutable
            unless explicitly set here.

    Expense:
      type: object
      required:
        [id, group_id, description, amount_cents, currency, payer_id, created_by, incurred_at, created_at, splits, category_id]
      properties:
        id: { type: string, format: uuid }
        group_id: { type: string, format: uuid }
        description: { type: string }
        amount_cents: { type: integer, format: int64 }
        currency: { type: string }
        payer_id: { type: string, format: uuid }
        created_by:
          type: string
          format: uuid
          description: |
            User who recorded the expense. Distinct from `payer_id` (who fronted
            the money) - any group member may create an expense on behalf of any
            other member, and the history attributes the action to this user.
        incurred_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        category_id: { type: string, format: uuid }
        splits:
          type: array
          items: { $ref: "#/components/schemas/Split" }

    Category:
      type: object
      required: [id, slug, label, group_label]
      properties:
        id:    { type: string, format: uuid }
        slug:  { type: string, description: "Stable machine identifier (e.g. `groceries`). The frontend maps this to an icon." }
        label: { type: string, description: "Human-readable name." }
        group_label: { type: string, description: "Section header for the picker (e.g. `Entertainment`, `No category`)." }

    ExpenseRevision:
      type: object
      required: [id, expense_id, edited_by, edited_at, field, old_value, new_value]
      properties:
        id:         { type: string, format: uuid }
        expense_id: { type: string, format: uuid }
        edited_by:  { type: string, format: uuid }
        edited_at:  { type: string, format: date-time }
        field:
          type: string
          enum: [description, amount_cents, category_id, payer_id]
          description: Which field was changed.
        old_value:  { type: string, description: "Previous value, stringified." }
        new_value:  { type: string, description: "New value, stringified." }

    Balance:
      type: object
      required: [user_id, display_name, net_cents]
      properties:
        user_id: { type: string, format: uuid }
        display_name: { type: string }
        net_cents: { type: integer, format: int64, description: "positive = owed to user; negative = user owes" }

    SimplifiedDebt:
      type: object
      required: [from_user_id, to_user_id, amount_cents]
      properties:
        from_user_id: { type: string, format: uuid }
        to_user_id: { type: string, format: uuid }
        amount_cents: { type: integer, format: int64, minimum: 1 }

    BalancesResponse:
      type: object
      required: [net, simplified]
      properties:
        net:
          type: array
          items: { $ref: "#/components/schemas/Balance" }
        simplified:
          type: array
          items: { $ref: "#/components/schemas/SimplifiedDebt" }

    CreateSettlementRequest:
      type: object
      additionalProperties: false
      required: [to_user_id, amount_cents]
      properties:
        to_user_id: { type: string, format: uuid }
        amount_cents: { type: integer, format: int64, minimum: 1 }
        note: { type: string, maxLength: 200 }
        settled_at: { type: string, format: date-time }

    Settlement:
      type: object
      required: [id, group_id, from_user_id, to_user_id, amount_cents, settled_at, created_at]
      properties:
        id: { type: string, format: uuid }
        group_id: { type: string, format: uuid }
        from_user_id: { type: string, format: uuid }
        to_user_id: { type: string, format: uuid }
        amount_cents: { type: integer, format: int64 }
        note: { type: string }
        settled_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }

    ActivityItem:
      type: object
      required: [kind, occurred_at]
      properties:
        kind:
          type: string
          enum: [expense, settlement]
        occurred_at: { type: string, format: date-time }
        cadence:
          allOf: [{ $ref: "#/components/schemas/Cadence" }]
          description: "When kind=expense and the expense matches a recurring template by content, the template's cadence. Omitted otherwise."
        expense:
          allOf: [{ $ref: "#/components/schemas/Expense" }]
          description: "Present iff kind=expense."
        settlement:
          allOf: [{ $ref: "#/components/schemas/Settlement" }]
          description: "Present iff kind=settlement."

    ActivityPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/ActivityItem" }
        next_cursor:
          type: string
          description: "Pass to the next request as `cursor`. Absent when there are no more items."

    Cadence:
      type: string
      enum: [daily, weekly, biweekly, monthly, yearly]

    CreateRecurringExpenseRequest:
      type: object
      additionalProperties: false
      required: [description, amount_cents, payer_id, mode, splits, cadence, next_run_at]
      properties:
        description: { type: string, minLength: 1, maxLength: 200 }
        amount_cents: { type: integer, format: int64, minimum: 1 }
        currency: { type: string, minLength: 3, maxLength: 3, description: "Defaults to group.default_currency if omitted" }
        payer_id: { type: string, format: uuid }
        category_id: { type: string, format: uuid, description: "Defaults to the `other` category when omitted." }
        mode: { $ref: "#/components/schemas/SplitMode" }
        splits:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/SplitInput" }
        cadence: { $ref: "#/components/schemas/Cadence" }
        next_run_at: { type: string, format: date-time }

    RecurringExpense:
      type: object
      required:
        [id, group_id, description, amount_cents, currency, payer_id, category_id, mode, splits, cadence, next_run_at, created_at]
      properties:
        id: { type: string, format: uuid }
        group_id: { type: string, format: uuid }
        description: { type: string }
        amount_cents: { type: integer, format: int64 }
        currency: { type: string }
        payer_id: { type: string, format: uuid }
        category_id: { type: string, format: uuid }
        mode: { $ref: "#/components/schemas/SplitMode" }
        splits:
          type: array
          items: { $ref: "#/components/schemas/SplitInput" }
        cadence: { $ref: "#/components/schemas/Cadence" }
        next_run_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }

    StepUpRequest:
      type: object
      additionalProperties: false
      required: [password]
      properties:
        password:
          type: string
          minLength: 1
          description: The admin's own password, re-entered for the destructive action.

    AdminUser:
      type: object
      required: [id, email, display_name, role, created_at, has_avatar, week_start]
      properties:
        id: { type: string, format: uuid }
        email:
          type: string
          format: email
          nullable: true
          description: Decrypted email. Null for soft-deleted users (their encrypted email is scrambled at delete time).
        display_name: { type: string }
        role:
          type: string
          enum: [user, admin]
        created_at: { type: string, format: date-time }
        deleted_at:
          type: string
          format: date-time
          description: Set when the account is soft-deleted.
        has_avatar: { type: boolean }
        week_start: { type: integer, enum: [0, 1] }

    AdminUserListResponse:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/AdminUser" }
        total: { type: integer, minimum: 0 }
        limit: { type: integer, minimum: 1 }
        offset: { type: integer, minimum: 0 }

    AdminUserCreateRequest:
      type: object
      additionalProperties: false
      required: [email, display_name]
      properties:
        email: { type: string, format: email }
        display_name: { type: string, minLength: 1, maxLength: 80 }
        role:
          type: string
          enum: [user, admin]
          default: user
      example:
        email: "alice@example.org"
        display_name: "Alice"
        role: "user"

    AdminSetUserRoleRequest:
      type: object
      additionalProperties: false
      required: [role, password]
      properties:
        role:
          type: string
          enum: [user, admin]
        password:
          type: string
          minLength: 1
          description: The admin's own password (step-up).

    AdminGroup:
      type: object
      required: [id, name, default_currency, created_by, created_at, member_count, expense_count]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        default_currency: { type: string, minLength: 3, maxLength: 3 }
        created_by: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
        member_count: { type: integer, minimum: 0 }
        expense_count: { type: integer, minimum: 0 }

    AdminGroupListResponse:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/AdminGroup" }
        total: { type: integer, minimum: 0 }
        limit: { type: integer, minimum: 1 }
        offset: { type: integer, minimum: 0 }

    SmtpTlsMode:
      type: string
      enum: [none, starttls, tls]

    SmtpConfig:
      type: object
      required: [host, port, from_address, tls_mode, password_set]
      properties:
        host: { type: string }
        port: { type: integer, minimum: 1, maximum: 65535 }
        username:
          type: string
          nullable: true
        from_address: { type: string, format: email }
        tls_mode: { $ref: "#/components/schemas/SmtpTlsMode" }
        password_set:
          type: boolean
          description: True when an encrypted password is stored. The cleartext is never returned.
        updated_at: { type: string, format: date-time }
        updated_by:
          type: string
          format: uuid
          nullable: true

    SmtpConfigUpdateRequest:
      type: object
      additionalProperties: false
      required: [host, port, from_address, tls_mode]
      properties:
        host: { type: string, minLength: 1 }
        port: { type: integer, minimum: 1, maximum: 65535 }
        username:
          type: string
          nullable: true
        from_address: { type: string, format: email }
        tls_mode: { $ref: "#/components/schemas/SmtpTlsMode" }
        smtp_password:
          type: string
          nullable: true
          description: SMTP password. Pass null to leave the existing one untouched; pass empty string to clear it; pass a non-empty value to set a new one.
        allow_plaintext_credentials:
          type: boolean
          default: false
          description: Required when tls_mode='none' and a username/password is provided.

    SmtpPasswordResponse:
      type: object
      required: [password]
      properties:
        password:
          type: string
          description: Cleartext SMTP password. Empty string when no password is stored.

    SmtpTestResponse:
      type: object
      required: [success]
      properties:
        success: { type: boolean }
        error:
          type: string
          description: Short, non-sensitive error code on failure (e.g. "dial_timeout", "auth_failed", "tls_handshake_failed").

    AdminAuditEntry:
      type: object
      required: [id, actor_user_id, action, success, created_at]
      properties:
        id: { type: string, format: uuid }
        actor_user_id: { type: string, format: uuid }
        target_user_id:
          type: string
          format: uuid
          nullable: true
        target_group_id:
          type: string
          format: uuid
          nullable: true
        action: { type: string }
        ip:
          type: string
          nullable: true
        user_agent:
          type: string
          nullable: true
        success: { type: boolean }
        metadata:
          type: object
          additionalProperties: true
          nullable: true
        created_at: { type: string, format: date-time }

    AdminAuditListResponse:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/AdminAuditEntry" }
        total: { type: integer, minimum: 0 }
        limit: { type: integer, minimum: 1 }
        offset: { type: integer, minimum: 0 }
